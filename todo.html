<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }

  .app {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 520px;
    height: fit-content;
    overflow: hidden;
  }

  header {
    background: #4f46e5;
    padding: 28px 28px 20px;
    color: #fff;
  }

  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }

  .stats {
    margin-top: 6px;
    font-size: 0.85rem;
    opacity: 0.8;
  }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 20px 24px;
    border-bottom: 1px solid #f0f2f5;
  }

  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .input-row input:focus { border-color: #4f46e5; }

  .input-row button {
    padding: 10px 18px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .input-row button:hover { background: #4338ca; }

  .filters {
    display: flex;
    gap: 4px;
    padding: 12px 24px;
    border-bottom: 1px solid #f0f2f5;
  }

  .filter-btn {
    padding: 5px 14px;
    border: 1.5px solid transparent;
    border-radius: 20px;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    background: none;
    color: #64748b;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: #4f46e5; border-color: #c7d2fe; }
  .filter-btn.active { background: #eef2ff; color: #4f46e5; border-color: #c7d2fe; }

  .list {
    list-style: none;
    min-height: 60px;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid #f8fafc;
    transition: background 0.1s;
  }

  .item:hover { background: #fafbff; }

  .item:hover .delete-btn { opacity: 1; }

  .item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #4f46e5;
    cursor: pointer;
    flex-shrink: 0;
  }

  .item-text {
    flex: 1;
    font-size: 0.95rem;
    color: #1e293b;
    word-break: break-word;
    transition: color 0.15s;
  }

  .item.done .item-text {
    text-decoration: line-through;
    color: #94a3b8;
  }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #cbd5e1;
    font-size: 1.1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: color 0.15s, opacity 0.15s;
  }

  .delete-btn:hover { color: #ef4444; }

  .empty {
    text-align: center;
    padding: 40px 24px;
    color: #94a3b8;
    font-size: 0.9rem;
  }

  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    border-top: 1px solid #f0f2f5;
  }

  .footer-label { font-size: 0.82rem; color: #94a3b8; }

  .clear-btn {
    background: none;
    border: none;
    font-size: 0.82rem;
    color: #94a3b8;
    cursor: pointer;
    transition: color 0.15s;
  }

  .clear-btn:hover { color: #ef4444; }
  .clear-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>To-Do</h1>
    <div class="stats" id="stats">0 tasks</div>
  </header>

  <div class="input-row">
    <input type="text" id="new-task" placeholder="Add a task…" maxlength="200">
    <button onclick="addTask()">Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Done</button>
  </div>

  <ul class="list" id="list"></ul>

  <footer>
    <span class="footer-label" id="remaining"></span>
    <button class="clear-btn" id="clear-btn" onclick="clearDone()">Clear completed</button>
  </footer>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';
  let nextId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1;

  const listEl = document.getElementById('list');
  const input = document.getElementById('new-task');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const text = input.value.trim();
    if (!text) return;
    tasks.push({ id: nextId++, text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  }

  function render() {
    const visible = tasks.filter(t =>
      filter === 'all' ? true :
      filter === 'active' ? !t.done :
      t.done
    );

    if (visible.length === 0) {
      const msgs = { all: 'No tasks yet. Add one above!', active: 'No active tasks.', done: 'Nothing completed yet.' };
      listEl.innerHTML = `<div class="empty">${msgs[filter]}</div>`;
    } else {
      listEl.innerHTML = visible.map(t => `
        <li class="item${t.done ? ' done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
          <span class="item-text">${escHtml(t.text)}</span>
          <button class="delete-btn" onclick="remove(${t.id})" title="Delete">&#x2715;</button>
        </li>
      `).join('');
    }

    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const active = total - done;

    document.getElementById('stats').textContent =
      `${total} task${total !== 1 ? 's' : ''} · ${done} completed`;
    document.getElementById('remaining').textContent =
      `${active} remaining`;
    const clearBtn = document.getElementById('clear-btn');
    clearBtn.disabled = done === 0;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
