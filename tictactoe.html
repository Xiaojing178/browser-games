<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a0a0ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 8px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: #16213e;
      border: 2px solid #2a2a5a;
      border-radius: 12px;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1f2f5a;
      transform: scale(1.05);
    }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #4ecdc4; }

    .cell.win {
      background: #2a2a5a;
      box-shadow: 0 0 16px rgba(160, 160, 255, 0.5);
    }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #2a2a5a;
      color: #e0e0ff;
      border: 2px solid #4a4aaa;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #3a3a7a; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { text-align: center; }
    #score .label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    #score .x-score { color: #ff6b6b; }
    #score .o-score { color: #4ecdc4; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <span><span class="label x-score">X</span><span id="score-x">0</span></span>
    <span><span class="label" style="color:#888">Draws</span><span id="score-d">0</span></span>
    <span><span class="label o-score">O</span><span id="score-o">0</span></span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over, scores;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      scores = scores || { X: 0, O: 0, D: 0 };
      render();
      setStatus("X's turn");
    }

    function render() {
      document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i];
        cell.className = 'cell' + (board[i] ? ' taken ' + board[i].toLowerCase() : '');
      });
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || over) return;
      const i = +cell.dataset.i;
      if (board[i]) return;

      board[i] = current;
      render();

      const win = checkWin();
      if (win) {
        win.forEach(idx => document.querySelectorAll('.cell')[idx].classList.add('win'));
        setStatus(`${current} wins!`);
        scores[current]++;
        document.getElementById('score-' + current.toLowerCase()).textContent = scores[current];
        over = true;
        return;
      }

      if (board.every(Boolean)) {
        setStatus("It's a draw!");
        scores.D++;
        document.getElementById('score-d').textContent = scores.D;
        over = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
